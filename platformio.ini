; === Shared hardware settings ===
[hw_common]
platform = espressif8266
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
lib_deps =
    me-no-dev/ESPAsyncTCP@^1.2.2
    me-no-dev/ESPAsyncWebServer@^1.2.4
    bblanchon/ArduinoJson@^7.4.2
    olikraus/U8g2@^2.35.30

; === Native unit tests (runs on host, no hardware) ===
[env:native]
platform = native
build_flags =
    -Itest/native_shim
    -Iinclude
    -std=c++11
build_src_filter =
    +<../src/morse_table.cpp>
    +<../src/profiles.cpp>
test_build_src = yes
lib_deps =
    throwtheswitch/Unity@^2.6.1

; === NodeMCU v2 (default) ===
[env:nodemcuv2]
extends = hw_common
board = nodemcuv2

; === ESP8266 0.96" OLED module v2.1.0 ===
[env:esp8266_oled]
extends = hw_common
board = nodemcuv2
build_flags = -DBOARD_ESP8266_OLED
